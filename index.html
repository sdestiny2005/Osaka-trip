<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>與寶遊大阪</title>

    <link rel="icon" href="pic.png?v=1">
    <link rel="apple-touch-icon" href="pic.png?v=1">
    <meta name="apple-mobile-web-app-title" content="與寶遊大阪">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .flight-field { background: #fff; border-radius: 1rem; padding: 1rem; border: 1px solid #fce7f3; margin-bottom: 1rem; }
        .date-tab { flex: 0 0 auto; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.75rem; transition: all 0.3s; }
        .date-tab.active { background: #f472b6; color: white; box-shadow: 0 4px 6px -1px rgba(244, 114, 182, 0.3); }
        .date-tab.inactive { background: #fdf2f8; color: #f472b6; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative shadow-xl bg-white">
        <header class="p-6 text-center border-b border-pink-100 bg-pink-50 sticky top-0 z-20">
            <h1 class="text-2xl font-bold text-pink-600 tracking-widest">OSAKA 2026 🌸</h1>
            <div class="flex justify-center items-center gap-2 mt-2 text-pink-400 text-xs font-bold">
                <i class="fa-solid fa-sun"></i><span>大阪 18°C / 24°C</span>
            </div>
        </header>

        <main class="p-5">
            <section v-if="activeTab === 'itinerary'" class="space-y-4">
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button v-for="date in dates" :key="date" @click="selectedDate = date" 
                        :class="selectedDate === date ? 'active' : 'inactive'" class="date-tab font-mono">
                        {{ date }}
                    </button>
                </div>

                <div class="flex justify-between items-center mt-4">
                    <h2 class="font-bold text-gray-700"><i class="fa-solid fa-location-dot mr-2 text-pink-400"></i>{{ selectedDate }} 行程</h2>
                    <button @click="addItem('itinerary')" class="text-xs bg-pink-400 text-white px-3 py-1 rounded-full shadow-md">+ 新增</button>
                </div>

                <div v-if="itineraryData[selectedDate].length === 0" class="py-10 text-center text-gray-300 text-sm">
                    今天還沒排行程喔～點擊新增吧！
                </div>

                <div v-for="(item, i) in itineraryData[selectedDate]" :key="i" class="flex gap-4 p-4 rounded-2xl bg-pink-50 border-l-4 border-pink-400 relative animate-fade-in">
                    <span class="text-sm font-mono text-pink-600">{{ item.time }}</span>
                    <span class="text-gray-700 font-medium">{{ item.event }}</span>
                    <button @click="removeItem('itinerary', i)" class="absolute right-3 text-pink-200"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </section>

            <section v-if="activeTab === 'flight'" class="space-y-6">
                <h2 class="font-bold text-gray-700 mb-4"><i class="fa-solid fa-plane-departure mr-2 text-pink-400"></i>航班資訊</h2>
                <div class="flight-field shadow-sm">
                    <p class="text-[10px] text-pink-400 font-bold uppercase mb-2">Departure 去程</p>
                    <div class="space-y-2">
                        <input v-model="flight.depNo" placeholder="航班號 (如: JX802)" class="w-full border-b border-pink-100 p-1 text-sm outline-none">
                        <div class="flex gap-2">
                            <input v-model="flight.depTime" placeholder="起飛時間" class="w-1/2 border-b border-pink-100 p-1 text-sm outline-none">
                            <input v-model="flight.depArr" placeholder="降落時間" class="w-1/2 border-b border-pink-100 p-1 text-sm outline-none">
                        </div>
                    </div>
                </div>
                <div class="flight-field shadow-sm">
                    <p class="text-[10px] text-pink-400 font-bold uppercase mb-2">Return 回程</p>
                    <div class="space-y-2">
                        <input v-model="flight.retNo" placeholder="航班號 (如: JX803)" class="w-full border-b border-pink-100 p-1 text-sm outline-none">
                        <div class="flex gap-2">
                            <input v-model="flight.retTime" placeholder="起飛時間" class="w-1/2 border-b border-pink-100 p-1 text-sm outline-none">
                            <input v-model="flight.retArr" placeholder="降落時間" class="w-1/2 border-b border-pink-100 p-1 text-sm outline-none">
                        </div>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="h-[70vh] rounded-[2rem] overflow-hidden border-2 border-pink-100 relative shadow-inner">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d105001.32551406804!2d135.42838031583193!3d34.67756810232599!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000e6553406e2e1%3A0xc554830ea309754!2sOsaka%2C%20Japan!5e0!3m2!1sen!2stw!4v1710000000000!5m2!1sen!2stw" 
                        class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </section>

            <section v-if="activeTab === 'expense'" class="space-y-4">
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-rose-300 to-pink-400 text-white shadow-lg shadow-pink-100 mb-6 text-center">
                    <p class="text-xs opacity-80 mb-1 tracking-widest">TOTAL JPY</p>
                    <p class="text-4xl font-bold font-mono">¥ {{ totalExpense.toLocaleString() }}</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-pink-100 space-y-3 shadow-sm">
                    <div class="flex gap-2">
                        <input v-model="newExpense.item" placeholder="花什麼錢？" class="flex-1 p-3 rounded-xl border-pink-50 border bg-pink-50 text-sm outline-none">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額" class="w-24 p-3 rounded-xl border-pink-50 border bg-pink-50 text-sm font-mono outline-none">
                    </div>
                    <div class="flex gap-2">
                        <select v-model="newExpense.method" class="flex-1 p-3 rounded-xl border-pink-50 border bg-pink-50 text-sm text-gray-500 outline-none">
                            <option value="現金">💵 現金</option>
                            <option value="信用卡">💳 信用卡</option>
                        </select>
                        <button @click="addExpense" class="bg-pink-500 text-white px-8 rounded-xl font-bold text-sm">新增記錄</button>
                    </div>
                </div>
                <div class="space-y-2 mt-4">
                    <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between items-center p-4 bg-white rounded-2xl border border-pink-50 shadow-sm">
                        <div>
                            <p class="text-gray-700 text-sm font-medium">{{ exp.item }}</p>
                            <p class="text-[9px] text-pink-400 uppercase tracking-tighter">{{ exp.method }}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono font-bold text-pink-500">¥{{ exp.amount }}</span>
                            <button @click="removeItem('expenses', i)" class="text-pink-100 hover:text-pink-300"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-pink-100 flex justify-around p-4 safe-area-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.03)] rounded-t-[2.5rem] z-30">
            <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-pink-500' : 'text-pink-200'" class="flex flex-col items-center">
                <i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[9px] mt-1 font-bold">行程</span>
            </button>
            <button @click="activeTab = 'flight'" :class="activeTab === 'flight' ? 'text-pink-500' : 'text-pink-200'" class="flex flex-col items-center">
                <i class="fa-solid fa-plane text-xl"></i><span class="text-[9px] mt-1 font-bold">航班</span>
            </button>
            <button @click="activeTab = 'map'" :class="activeTab === 'map' ? 'text-pink-500' : 'text-pink-200'" class="flex flex-col items-center">
                <i class="fa-solid fa-map text-xl"></i><span class="text-[9px] mt-1 font-bold">地圖</span>
            </button>
            <button @click="activeTab = 'expense'" :class="activeTab === 'expense' ? 'text-pink-500' : 'text-pink-200'" class="flex flex-col items-center">
                <i class="fa-solid fa-wallet text-xl"></i><span class="text-[9px] mt-1 font-bold">記帳</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;
        createApp({
            setup() {
                const activeTab = ref('itinerary');
                const selectedDate = ref('4/16');
                const dates = ['4/16', '4/17', '4/18', '4/19', '4/20', '4/21'];

                const flight = ref({ depNo: '', depTime: '', depArr: '', retNo: '', retTime: '', retArr: '' });
                const expenses = ref([]);
                const itineraryData = ref({
                    '4/16': [], '4/17': [], '4/18': [], '4/19': [], '4/20': [], '4/21': []
                });
                
                const newExpense = ref({ item: '', amount: null, method: '現金' });

                onMounted(() => {
                    const savedIt = localStorage.getItem('osaka_it_v3');
                    const savedEx = localStorage.getItem('osaka_ex_v3');
                    const savedFl = localStorage.getItem('osaka_fl_v3');
                    if (savedIt) itineraryData.value = JSON.parse(savedIt);
                    if (savedEx) expenses.value = JSON.parse(savedEx);
                    if (savedFl) flight.value = JSON.parse(savedFl);
                });

                watch([itineraryData, expenses, flight], () => {
                    localStorage.setItem('osaka_it_v3', JSON.stringify(itineraryData.value));
                    localStorage.setItem('osaka_ex_v3', JSON.stringify(expenses.value));
                    localStorage.setItem('osaka_fl_v3', JSON.stringify(flight.value));
                }, { deep: true });

                const totalExpense = computed(() => expenses.value.reduce((sum, e) => sum + (e.amount || 0), 0));

                const addExpense = () => {
                    if (newExpense.value.item && newExpense.value.amount) {
                        expenses.value.unshift({ ...newExpense.value });
                        newExpense.value = { item: '', amount: null, method: '現金' };
                    }
                };

                const addItem = (type) => {
                    const event = prompt("輸入目的地或行程內容");
                    const time = prompt("輸入時間 (如 12:00)");
                    if(event && time) {
                        itineraryData.value[selectedDate.value].push({ time, event });
                        itineraryData.value[selectedDate.value].sort((a, b) => a.time.localeCompare(b.time));
                    }
                };

                const removeItem = (type, index) => {
                    if (type === 'expenses') expenses.value.splice(index, 1);
                    if (type === 'itinerary') itineraryData.value[selectedDate.value].splice(index, 1);
                };

                return { activeTab, selectedDate, dates, flight, itineraryData, expenses, totalExpense, newExpense, addExpense, addItem, removeItem };
            }
        }).mount('#app');
    </script>
</body>
</html>
