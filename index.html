<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>與寶遊大阪</title>

    <link rel="icon" href="pic.png?v=1">
    <link rel="apple-touch-icon" href="pic.png?v=1">
    <meta name="apple-mobile-web-app-title" content="與寶遊大阪">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .flight-input { background: transparent; border-bottom: 1px dashed #f9a8d4; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative shadow-xl bg-white">
        <header class="p-6 text-center border-b border-pink-100 bg-pink-50 sticky top-0 z-10">
            <h1 class="text-2xl font-bold text-pink-600 tracking-widest">OSAKA 2026 🌸</h1>
            <div class="flex justify-center items-center gap-2 mt-2 text-pink-400 text-xs font-bold">
                <i class="fa-solid fa-cloud-sun"></i>
                <span>大阪 15°C / 22°C 晴れ</span>
            </div>
        </header>

        <main class="p-5">
            <section class="mb-6 p-4 bg-pink-50 rounded-3xl border border-pink-100 shadow-sm text-xs">
                <div class="flex items-center gap-2 mb-2 text-pink-500 font-bold">
                    <i class="fa-solid fa-plane"></i> 航班資訊 (點擊編輯)
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-[10px] text-pink-400">去程航班/時間</p>
                        <input v-model="flight.dep" class="flight-input text-gray-700 font-medium py-1">
                    </div>
                    <div>
                        <p class="text-[10px] text-pink-400">回程航班/時間</p>
                        <input v-model="flight.ret" class="flight-input text-gray-700 font-medium py-1">
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'itinerary'" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-gray-700"><i class="fa-solid fa-calendar-day mr-2 text-pink-400"></i>今日行程</h2>
                    <button @click="addItem('itinerary')" class="text-xs bg-pink-400 text-white px-3 py-1 rounded-full shadow-md">+ 新增行程</button>
                </div>
                <div v-for="(item, i) in itinerary" :key="i" class="flex gap-4 p-4 rounded-2xl bg-pink-50 border-l-4 border-pink-400 relative">
                    <span class="text-sm font-mono text-pink-600">{{ item.time }}</span>
                    <span class="text-gray-700 font-medium">{{ item.event }}</span>
                    <button @click="removeItem('itinerary', i)" class="absolute right-3 text-pink-200 hover:text-pink-400"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="h-[70vh] rounded-3xl overflow-hidden border-2 border-pink-100 relative shadow-inner">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m13!1m3!1d104994.77494519962!2d135.4158499252445!3d34.6783950156976!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000e6553406e2e1%3A0x237006834b6e5162!2z5pel5pys5aSn6Ziq5bqc5aSn6Ziq5biC!5e0!3m2!1szh-TW!2stw!4v1710650000000!5m2!1szh-TW!2stw" 
                        class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </section>

            <section v-if="activeTab === 'expense'" class="space-y-4">
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-rose-300 to-pink-400 text-white shadow-lg shadow-pink-100 mb-6">
                    <p class="text-xs opacity-80 mb-1">Total Expenses (JPY)</p>
                    <p class="text-4xl font-bold font-mono">¥ {{ totalExpense.toLocaleString() }}</p>
                </div>
                
                <div class="bg-white p-4 rounded-3xl border border-pink-100 space-y-3 shadow-sm">
                    <div class="flex gap-2">
                        <input v-model="newExpense.item" placeholder="品項" class="flex-1 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額" class="w-24 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm font-mono">
                    </div>
                    <div class="flex gap-2">
                        <select v-model="newExpense.method" class="flex-1 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm text-gray-600">
                            <option value="現金">💵 現金</option>
                            <option value="信用卡">💳 信用卡</option>
                        </select>
                        <button @click="addExpense" class="bg-pink-500 text-white px-6 rounded-xl font-bold text-sm">新增</button>
                    </div>
                </div>

                <div class="space-y-2 mt-4">
                    <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between items-center p-4 bg-white rounded-2xl border border-pink-50 shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-gray-600 text-sm">{{ exp.item }}</span>
                            <span class="text-[10px] text-pink-400">{{ exp.method }}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono font-bold text-pink-500">¥{{ exp.amount }}</span>
                            <button @click="removeItem('expenses', i)" class="text-gray-300"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'shopping'" class="space-y-3">
                <div class="flex gap-2 mb-6">
                    <input v-model="newShopItem" @keyup.enter="addItem('shopping')" placeholder="想買什麼伴手禮？" class="flex-1 p-4 rounded-2xl border-pink-100 border bg-pink-50 text-sm">
                    <button @click="addItem('shopping')" class="bg-pink-500 text-white px-6 rounded-2xl">追加</button>
                </div>
                <div v-for="(shop, i) in shoppingList" :key="i" class="flex items-center p-5 bg-white rounded-2xl border border-pink-50 shadow-sm">
                    <input type="checkbox" v-model="shop.done" class="w-6 h-6 border-2 border-pink-200 rounded-full checked:bg-pink-500 accent-pink-500">
                    <span :class="{'line-through text-gray-300': shop.done}" class="ml-4 text-gray-600 flex-1">{{ shop.name }}</span>
                    <button @click="removeItem('shopping', i)" class="text-gray-200"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-pink-100 flex justify-around p-4 safe-area-bottom shadow-[0_-10px_30px_rgba(244,114,182,0.1)] rounded-t-[2rem]">
            <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id" 
                :class="activeTab === tab.id ? 'text-pink-500 scale-110' : 'text-pink-200'" class="flex flex-col items-center transition-all duration-300">
                <i :class="tab.icon" class="text-xl"></i>
                <span class="text-[9px] mt-1 font-bold">{{ tab.name }}</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;
        createApp({
            setup() {
                const activeTab = ref('itinerary');
                const tabs = [
                    { id: 'itinerary', name: '行程', icon: 'fa-solid fa-map-location' },
                    { id: 'map', name: '地圖', icon: 'fa-solid fa-compass' },
                    { id: 'expense', name: '記帳', icon: 'fa-solid fa-wallet' },
                    { id: 'shopping', name: '清單', icon: 'fa-solid fa-basket-shopping' }
                ];

                const flight = ref({ dep: '星宇 JX802 08:30', ret: '星宇 JX803 13:15' });
                const itinerary = ref([{ time: '09:00', event: '範例：前往梅田' }]);
                const expenses = ref([{ item: '範例：拉麵', amount: 1000, method: '現金' }]);
                const shoppingList = ref([{ name: '範例：合利他命', done: false }]);
                
                const newExpense = ref({ item: '', amount: null, method: '現金' });
                const newShopItem = ref('');

                onMounted(() => {
                    const savedItinerary = localStorage.getItem('osaka_itinerary');
                    const savedExpenses = localStorage.getItem('osaka_expenses');
                    const savedShopping = localStorage.getItem('osaka_shopping');
                    const savedFlight = localStorage.getItem('osaka_flight');
                    
                    if (savedItinerary) itinerary.value = JSON.parse(savedItinerary);
                    if (savedExpenses) expenses.value = JSON.parse(savedExpenses);
                    if (savedShopping) shoppingList.value = JSON.parse(savedShopping);
                    if (savedFlight) flight.value = JSON.parse(savedFlight);
                });

                watch(itinerary, (val) => localStorage.setItem('osaka_itinerary', JSON.stringify(val)), { deep: true });
                watch(expenses, (val) => localStorage.setItem('osaka_expenses', JSON.stringify(val)), { deep: true });
                watch(shoppingList, (val) => localStorage.setItem('osaka_shopping', JSON.stringify(val)), { deep: true });
                watch(flight, (val) => localStorage.setItem('osaka_flight', JSON.stringify(val)), { deep: true });

                const totalExpense = computed(() => expenses.value.reduce((sum, e) => sum + (e.amount || 0), 0));

                const addExpense = () => {
                    if (newExpense.value.item && newExpense.value.amount) {
                        expenses.value.unshift({ ...newExpense.value });
                        newExpense.value = { item: '', amount: null, method: '現金' };
                    }
                };

                const addItem = (type) => {
                    if (type === 'shopping' && newShopItem.value) {
                        shoppingList.value.unshift({ name: newShopItem.value, done: false });
                        newShopItem.value = '';
                    } else if (type === 'itinerary') {
                        const event = prompt("輸入行程內容");
                        const time = prompt("輸入時間 (如 12:00)");
                        if(event && time) itinerary.value.push({ time, event });
                    }
                };

                const removeItem = (type, index) => {
                    if (type === 'expenses') expenses.value.splice(index, 1);
                    if (type === 'shopping') shoppingList.value.splice(index, 1);
                    if (type === 'itinerary') itinerary.value.splice(index, 1);
                };

                return { activeTab, tabs, flight, itinerary, expenses, shoppingList, totalExpense, newExpense, newShopItem, addExpense, addItem, removeItem };
            }
        }).mount('#app');
    </script>
</body>
</html>
