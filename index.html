<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>與寶遊大阪</title>

    <link rel="icon" href="pic.png?v=1">
    <link rel="apple-touch-icon" href="pic.png?v=1">
    <meta name="apple-mobile-web-app-title" content="與寶遊大阪">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select { -webkit-appearance: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative shadow-xl bg-white">
        <header class="p-6 text-center border-b border-pink-100 bg-pink-50 sticky top-0 z-10">
            <h1 class="text-2xl font-bold text-pink-600 tracking-widest">OSAKA 2026 🌸</h1>
            <div class="flex justify-center items-center gap-2 mt-2 text-pink-400 text-xs">
                <span>大阪市中心</span>
                <i class="fa-solid fa-cloud-sun text-pink-500"></i>
                <span>18°C / 10% 🌧️</span>
            </div>
        </header>

        <main class="p-5">
            <section class="mb-8 p-4 bg-white border border-pink-100 rounded-3xl shadow-sm">
                <h2 class="text-sm font-bold text-gray-700 mb-3"><i class="fa-solid fa-plane-departure mr-2 text-pink-400"></i>來回航班</h2>
                <div class="space-y-3 text-xs">
                    <div class="flex justify-between items-center p-2 bg-pink-50 rounded-xl">
                        <span class="font-bold">去程</span>
                        <span>04/16 TPE ➔ KIX</span>
                        <span class="text-pink-600 font-mono">JX802</span>
                    </div>
                    <div class="flex justify-between items-center p-2 bg-pink-50 rounded-xl">
                        <span class="font-bold">回程</span>
                        <span>04/21 KIX ➔ TPE</span>
                        <span class="text-pink-600 font-mono">JX803</span>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'itinerary'" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-gray-700"><i class="fa-solid fa-calendar-day mr-2 text-pink-400"></i>今日行程</h2>
                    <button @click="addItem('itinerary')" class="text-xs bg-pink-400 text-white px-3 py-1 rounded-full">+ 新增</button>
                </div>
                <div v-for="(item, i) in itinerary" :key="i" class="p-4 rounded-2xl bg-pink-50 border-l-4 border-pink-400 relative">
                    <div class="flex gap-4 mb-2">
                        <span class="text-sm font-mono text-pink-600">{{ item.time }}</span>
                        <span class="text-gray-700 font-medium">{{ item.event }}</span>
                    </div>
                    <div v-if="item.station" class="flex items-center gap-2 text-[10px] text-gray-500 bg-white/50 p-2 rounded-lg">
                        <i class="fa-solid fa-train-subway text-pink-400"></i>
                        <span>轉乘：{{ item.station }}</span>
                        <a :href="'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(item.event)" target="_blank" class="ml-auto bg-white px-2 py-1 rounded-md text-pink-500 border border-pink-200 shadow-sm">
                            <i class="fa-solid fa-location-arrow mr-1"></i>導航
                        </a>
                    </div>
                    <button @click="removeItem('itinerary', i)" class="absolute top-4 right-3 text-pink-200 hover:text-pink-400"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="h-[70vh] rounded-3xl overflow-hidden border-2 border-pink-100 relative shadow-inner">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d104997.0863779872!2d135.4300305!3d34.6783952!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000e6553406e2e1%3A0xc55bc16ee46c2fe7!2sOsaka!5e0!3m2!1sen!2sjp!4v1710660000000!5m2!1sen!2sjp" 
                        class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </section>

            <section v-if="activeTab === 'expense'" class="space-y-4">
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-rose-300 to-pink-400 text-white shadow-lg shadow-pink-100 mb-6">
                    <p class="text-xs opacity-80 mb-1">Total Expenses (JPY)</p>
                    <p class="text-4xl font-bold font-mono">¥ {{ totalExpense.toLocaleString() }}</p>
                </div>
                
                <div class="bg-white p-4 rounded-3xl border border-pink-100 space-y-3">
                    <div class="flex gap-2">
                        <input v-model="newExpense.item" placeholder="品項" class="flex-1 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額" class="w-24 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm font-mono">
                    </div>
                    <div class="flex gap-2">
                        <select v-model="newExpense.method" class="flex-1 p-3 rounded-xl border-pink-100 border bg-pink-50 text-sm text-gray-600">
                            <option value="現金">💵 現金</option>
                            <option value="信用卡">💳 信用卡</option>
                        </select>
                        <button @click="addExpense" class="bg-pink-500 text-white px-8 rounded-xl font-bold">新增記錄</button>
                    </div>
                </div>

                <div class="space-y-2 mt-6">
                    <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between items-center p-4 bg-white
