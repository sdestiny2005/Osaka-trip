<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>與寶遊大阪</title>

    <link rel="icon" href="pic.png?v=1">
    <link rel="apple-touch-icon" href="pic.png?v=1">
    <meta name="apple-mobile-web-app-title" content="與寶遊大阪">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffdf2; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .flight-field { background: #fff; border-radius: 1.2rem; padding: 1.2rem; border: 1px solid #fef3c7; margin-bottom: 1rem; }
        /* 日期標籤樣式 */
        .date-tab { flex: 0 0 auto; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.75rem; transition: all 0.3s; border: 1px solid transparent; }
        .date-tab.active { background: #fbbf24; color: white; box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3); }
        .date-tab.inactive { background: #fff; color: #d97706; border-color: #fef3c7; }
        /* 陰影微調 */
        .soft-shadow { box-shadow: 0 10px 25px -5px rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-28 relative shadow-xl bg-white">
        <header class="p-5 text-center border-b border-amber-100 bg-amber-50 sticky top-0 z-20">
            <h1 class="text-xl font-bold text-amber-700 tracking-widest uppercase">Osaka Trip 2026</h1>
            <div class="flex justify-center items-center gap-2 mt-1 text-amber-500 text-[10px] font-bold">
                <i class="fa-solid fa-sun-plant-wilt"></i><span>OSAKA 18°C / 24°C ☀️</span>
            </div>
        </header>

        <main class="p-4">
            <section v-show="activeTab === 'itinerary'" class="space-y-4">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
                    <button v-for="date in dates" :key="date" @click="selectedDate = date" 
                        :class="selectedDate === date ? 'active' : 'inactive'" class="date-tab font-mono font-bold">
                        {{ date }}
                    </button>
                </div>
                <div class="flex justify-between items-center px-1">
                    <h2 class="font-bold text-amber-900 text-sm"><i class="fa-solid fa-map-pin mr-2 text-amber-500"></i>{{ selectedDate }} 行程</h2>
                    <button @click="addItem('itinerary')" class="text-[10px] bg-amber-500 text-white px-3 py-1.5 rounded-full shadow-sm font-bold">+ 新增行程</button>
                </div>
                <div v-for="(item, i) in itineraryData[selectedDate]" :key="i" class="flex gap-4 p-4 rounded-2xl bg-amber-50 border-l-4 border-amber-400 relative">
                    <span class="text-sm font-mono text-amber-600 font-bold">{{ item.time }}</span>
                    <span class="text-gray-700 font-medium text-sm">{{ item.event }}</span>
                    <button @click="removeItem('itinerary', i)" class="absolute right-3 text-amber-200"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </section>

            <section v-show="activeTab === 'flight'" class="space-y-4">
                <h2 class="font-bold text-amber-900 mb-2"><i class="fa-solid fa-plane-up mr-2 text-amber-500"></i>航班資訊</h2>
                <div class="flight-field soft-shadow">
                    <p class="text-[10px] text-amber-600 font-black mb-3 border-b border-amber-50 pb-1 italic">DEPARTURE 去程</p>
                    <div class="space-y-3">
                        <input v-model="flight.depNo" placeholder="航班號 (如: JX802)" class="w-full p-1 text-sm outline-none border-b border-amber-50 font-bold text-gray-700">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="text-[9px] text-amber-400 font-bold uppercase">起飛</label>
                                <input v-model="flight.depTime" placeholder="08:30" class="w-full text-sm outline-none font-mono text-gray-600">
                            </div>
                            <div class="flex-1">
                                <label class="text-[9px] text-amber-400 font-bold uppercase">降落</label>
                                <input v-model="flight.depArr" placeholder="12:15" class="w-full text-sm outline-none font-mono text-gray-600">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flight-field soft-shadow">
                    <p class="text-[10px] text-amber-600 font-black mb-3 border-b border-amber-50 pb-1 italic">RETURN 回程</p>
                    <div class="space-y-3">
                        <input v-model="flight.retNo" placeholder="航班號 (如: JX803)" class="w-full p-1 text-sm outline-none border-b border-amber-50 font-bold text-gray-700">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="text-[9px] text-amber-400 font-bold uppercase">起飛</label>
                                <input v-model="flight.retTime" placeholder="13:15" class="w-full text-sm outline-none font-mono text-gray-600">
                            </div>
                            <div class="flex-1">
                                <label class="text-[9px] text-amber-400 font-bold uppercase">降落</label>
                                <input v-model="flight.retArr" placeholder="17:00" class="w-full text-sm outline-none font-mono text-gray-600">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section v-show="activeTab === 'map'" class="space-y-4">
                <div class="h-[70vh] rounded-[2rem] overflow-hidden border-2 border-amber-100 shadow-inner">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d105012.20361361286!2d135.41595168453587!3d34.66782294157584!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000e6553406e2e1%3A0xc55bc16ee46c2fe7!2z5pel5pys5aSn6Ziq5bqc5aSn6Ziq5biC!5e0!3m2!1szh-TW!2stw!4v1710660000000!5m2!1szh-TW!2stw" 
                        class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </section>

            <section v-show="activeTab === 'expense'" class="space-y-4">
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-amber-300 to-yellow-500 text-white shadow-lg text-center">
                    <p class="text-[10px] opacity-90 mb-1 font-black tracking-widest uppercase">Total Spent (JPY)</p>
                    <p class="text-4xl font-bold font-mono">¥ {{ totalExpense.toLocaleString() }}</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-amber-50 soft-shadow space-y-3">
                    <div class="flex gap-2">
                        <input v-model="newExpense.item" placeholder="品項" class="flex-1 p-3 rounded-xl bg-amber-50 text-sm outline-none border-none">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額" class="w-24 p-3 rounded-xl bg-amber-50 text-sm font-mono outline-none border-none">
                    </div>
                    <div class="flex gap-2">
                        <select v-model="newExpense.method" class="flex-1 p-3 rounded-xl bg-amber-50 text-sm text-amber-700 outline-none border-none">
                            <option value="現金">💵 現金</option>
                            <option value="信用卡">💳 信用卡</option>
                        </select>
                        <button @click="addExpense" class="bg-amber-500 text-white px-8 rounded-xl font-bold text-xs uppercase shadow-md active:scale-95 transition-transform">Add</button>
                    </div>
                </div>
                <div class="space-y-2 mt-4">
                    <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between items-center p-4 bg-white rounded-2xl border border-amber-50">
                        <div class="flex flex-col">
                            <span class="text-gray-700 text-sm font-bold">{{ exp.item }}</span>
                            <span class="text-[9px] text-amber-500 font-bold uppercase tracking-widest">{{ exp.method }}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono font-bold text-amber-600">¥{{ exp.amount }}</span>
                            <button @click="removeItem('expenses', i)" class="text-amber-200 hover:text-amber-400"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>
            </section>

            <section v-show="activeTab === 'shopping'" class="space-y-4">
                <h2 class="font-bold text-amber-900 mb-2"><i class="fa-solid fa-cart-shopping mr-2 text-amber-500"></i>伴手禮清單</h2>
                <div class="flex gap-2 mb-6">
                    <input v-model="newShopItem" @keyup.enter="addItem('shopping')" placeholder="想買什麼呢？" class="flex-1 p-4 rounded-2xl bg-amber-50 text-sm outline-none border border-amber-100">
                    <button @click="addItem('shopping')" class="bg-amber-500 text-white px-6 rounded-2xl font-bold text-xs uppercase shadow-sm">Save</button>
                </div>
                <div v-for="(shop, i) in shoppingList" :key="i" class="flex items-center p-5 bg-white rounded-2xl border border-amber-50 shadow-sm transition-all" :class="{'opacity-50': shop.done}">
                    <input type="checkbox" v-model="shop.done" class="w-6 h-6 rounded-full accent-amber-500">
                    <span :class="{'line-through text-gray-400': shop.done}" class="ml-4 text-gray-700 flex-1 text-sm font-medium">{{ shop.name }}</span>
                    <button @click="removeItem('shopping', i)" class="text-amber-200"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-amber-100 flex justify-between px-2 py-3 safe-area-bottom shadow-[0_-10px_40px_rgba(251,191,36,0.1)] rounded-t-[2.5rem] z-30">
            <button v-for="btn in navButtons" :key="btn.id" @click="activeTab = btn.id" 
                :class="activeTab === btn.id ? 'text-amber-500' : 'text-amber-200'" class="flex flex-col items-center flex-1 transition-colors">
                <i :class="btn.icon" class="text-xl"></i>
                <span class="text-[8px] mt-1 font-black uppercase tracking-tighter">{{ btn.label }}</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;
        createApp({
            setup() {
                const activeTab = ref('itinerary');
                const selectedDate = ref('4/16');
                const dates = ['4/16', '4/17', '4/18', '4/19', '4/20', '4/21'];
                const navButtons = [
                    { id: 'itinerary', label: '行程', icon: 'fa-solid fa-calendar-check' },
                    { id: 'flight', label: '航班', icon: 'fa-solid fa-plane' },
                    { id: 'map', label: '地圖', icon: 'fa-solid fa-map-location-dot' },
                    { id: 'expense', label: '記帳', icon: 'fa-solid fa-wallet' },
                    { id: 'shopping', label: '清單', icon: 'fa-solid fa-cart-shopping' }
                ];

                const flight = ref({ depNo: '', depTime: '', depArr: '', retNo: '', retTime: '', retArr: '' });
                const expenses = ref([]);
                const shoppingList = ref([]);
                const itineraryData = ref({ '4/16': [], '4/17': [], '4/18': [], '4/19': [], '4/20': [], '4/21': [] });
                
                const newExpense = ref({ item: '', amount: null, method: '現金' });
                const newShopItem = ref('');

                onMounted(() => {
                    const savedIt = localStorage.getItem('osaka_it_v4');
                    const savedEx = localStorage.getItem('osaka_ex_v4');
                    const savedFl = localStorage.getItem('osaka_fl_v4');
                    const savedSh = localStorage.getItem('osaka_sh_v4');
                    if (savedIt) itineraryData.value = JSON.parse(savedIt);
                    if (savedEx) expenses.value = JSON.parse(savedEx);
                    if (savedFl) flight.value = JSON.parse(savedFl);
                    if (savedSh) shoppingList.value = JSON.parse(savedSh);
                });

                watch([itineraryData, expenses, flight, shoppingList], () => {
                    localStorage.setItem('osaka_it_v4', JSON.stringify(itineraryData.value));
                    localStorage.setItem('osaka_ex_v4', JSON.stringify(expenses.value));
                    localStorage.setItem('osaka_fl_v4', JSON.stringify(flight.value));
                    localStorage.setItem('osaka_sh_v4', JSON.stringify(shoppingList.value));
                }, { deep: true });

                const totalExpense = computed(() => expenses.value.reduce((sum, e) => sum + (e.amount || 0), 0));

                const addExpense = () => {
                    if (newExpense.value.item && newExpense.value.amount) {
                        expenses.value.unshift({ ...newExpense.value });
                        newExpense.value = { item: '', amount: null, method: '現金' };
                    }
                };

                const addItem = (type) => {
                    if (type === 'shopping' && newShopItem.value) {
                        shoppingList.value.unshift({ name: newShopItem.value, done: false });
                        newShopItem.value = '';
                    } else if (type === 'itinerary') {
                        const event = prompt("要去哪裡？");
                        const time = prompt("幾點？(如 09:30)");
                        if(event && time) {
                            itineraryData.value[selectedDate.value].push({ time, event });
                            itineraryData.value[selectedDate.value].sort((a, b) => a.time.localeCompare(b.time));
                        }
                    }
                };

                const removeItem = (type, index) => {
                    if (type === 'expenses') expenses.value.splice(index, 1);
                    if (type === 'shopping') shoppingList.value.splice(index, 1);
                    if (type === 'itinerary') itineraryData.value[selectedDate.value].splice(index, 1);
                };

                return { activeTab, selectedDate, dates, navButtons, flight, itineraryData, expenses, shoppingList, totalExpense, newExpense, newShopItem, addExpense, addItem, removeItem };
            }
        }).mount('#app');
    </script>
</body>
</html>
